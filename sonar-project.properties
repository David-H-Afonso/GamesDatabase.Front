# SonarCloud configuration for GamesDatabase Frontend
sonar.projectKey=David-H-Afonso_GamesDatabase-Front
sonar.organization=david-h-afonso
sonar.projectName=GamesDatabase.Front

# Source
sonar.sources=src
sonar.exclusions=src/test/**,src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx,src/vite-env.d.ts

# Tests
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPaths=tsconfig.app.json

# Quality gate thresholds
sonar.qualitygate.wait=true
