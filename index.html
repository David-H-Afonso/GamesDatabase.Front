<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/x-icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/manifest.json" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Games Database" />
		<meta name="theme-color" content="#1a1a1a" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Games Database</title>
		<meta name="description" content="Games Database – track, manage, and explore your personal game collection with statuses, ratings, platforms, and more." />
		<!-- Load runtime environment configuration (for Docker) -->
		<!-- defer keeps it out of the critical render path; type="module" (main.tsx) is
		     also deferred so document order is preserved and ENV is always set first -->
		<script defer src="/env-config.js"></script>
		<!-- Apply theme IMMEDIATELY before any rendering to prevent FOUC -->
		<script>
			;(function () {
				const theme = localStorage.getItem('theme') || 'oscuro'
				document.documentElement.setAttribute('data-theme', theme)
				// Add a class to prevent transitions on initial load
				document.documentElement.classList.add('preload')
			})()
		</script>
		<!-- fonts.googleapis.com serves a stylesheet (no CORS needed, no crossorigin).
		     fonts.gstatic.com serves the actual font files (cross-origin fetch, needs crossorigin). -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			rel="preload"
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			as="style"
			onload="
				this.onload = null
				this.rel = 'stylesheet'
			" />
		<noscript>
			<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
		</noscript>
	</head>
	<body>
		<div id="root"></div>
		<div id="dropdown-portal"></div>
		<div id="modal-portal"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
