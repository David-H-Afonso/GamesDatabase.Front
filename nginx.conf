server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Required by nginx when proxy_pass uses a variable
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript image/svg+xml font/woff2;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: allow self + Google Fonts + inline styles for theme + http for local API images
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: http: https:; connect-src 'self' http: https: ws: wss:; frame-ancestors 'self';" always;

    # Assets - servir desde raíz siempre
    location /assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # env-config.js - servir desde raíz siempre
    location /env-config.js {
        alias /usr/share/nginx/html/env-config.js;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Proxy game images to API server
    # API_IMAGES_URL will be replaced at runtime via entrypoint
    # ^~ prevents the static-assets regex below from intercepting .jpg/.png URLs
    location ^~ /game-images/ {
        set $api_images_url "API_IMAGES_URL_PLACEHOLDER";
        proxy_pass $api_images_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;
        # Override upstream cache headers so nginx controls caching
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        proxy_hide_header Expires;
        # no-cache: browser must revalidate every request using the ETag.
        # If the image hasn't changed the API returns 304 (no body transferred).
        # This means a replaced image (same filename) is visible immediately.
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache index.html (no-cache, not no-store, to keep pages eligible for bfcache)
    location ~* index\.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Main location - SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Disable logging for favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
